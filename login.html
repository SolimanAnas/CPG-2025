<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DCAS CPG | Professional Sign In</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 30%, #0B1120, #08101E);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }
    /* subtle animated grain */
    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }
    /* main card container */
    .auth-container {
      width: 100%; max-width: 460px; z-index: 2;
      animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    /* glassmorphism premium card */
    .professional-card {
      background: rgba(18, 25, 45, 0.75); backdrop-filter: blur(12px);
      border-radius: 2rem; border: 1px solid rgba(66, 153, 225, 0.25);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(66, 153, 225, 0.1) inset;
      padding: 2.5rem 2rem; transition: transform 0.2s ease, box-shadow 0.2s;
    }
    .professional-card:hover { box-shadow: 0 30px 50px -18px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(66, 153, 225, 0.2) inset; }
    /* header section */
    .brand-header { text-align: center; margin-bottom: 2rem; }
    .badge-icon {
      background: linear-gradient(135deg, #1E3A8A, #3B82F6); width: 64px; height: 64px; border-radius: 32px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;
      box-shadow: 0 10px 20px -5px rgba(0, 100, 255, 0.3);
    }
    .badge-icon i { font-size: 32px; color: white; }
    h1 {
      font-size: 2rem; font-weight: 700; background: linear-gradient(to right, #F0F9FF, #A5D8FF);
      background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: -0.5px;
    }
    .subhead { color: #94A3B8; font-size: 0.95rem; margin-top: 0.5rem; font-weight: 500; }
    /* form groups */
    .form-group { margin-bottom: 1.25rem; }
    .input-label { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.85rem; letter-spacing: 0.3px; color: #CBD5E1; margin-bottom: 0.5rem; }
    .input-label i { font-size: 0.85rem; color: #3B82F6; width: 18px; }
    .input-field {
      width: 100%; background: rgba(12, 20, 30, 0.7); border: 1px solid #2D3A5E; border-radius: 1rem; padding: 0.9rem 1rem;
      font-size: 1rem; font-family: 'Inter', sans-serif; color: #F1F5F9; transition: all 0.2s ease; outline: none;
    }
    .input-field:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25); background: rgba(18, 30, 45, 0.9); }
    /* btn */
    .login-btn {
      width: 100%; background: linear-gradient(95deg, #2563EB, #1E40AF); border: none; border-radius: 1.5rem; padding: 1rem;
      font-weight: 700; font-size: 1rem; color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center;
      gap: 10px; cursor: pointer; transition: all 0.25s ease; margin-top: 1rem; box-shadow: 0 5px 15px -5px #1E3A8A;
    }
    .login-btn:hover { background: linear-gradient(95deg, #3B82F6, #1E3A8A); transform: translateY(-2px); box-shadow: 0 12px 20px -8px #1E3A8A; }
    .login-btn:active { transform: translateY(1px); }
    /* messages */
    .form-feedback { margin-top: 1rem; font-size: 0.85rem; font-weight: 500; text-align: center; padding: 0.6rem; border-radius: 12px; display: none; }
    .error-msg { color: #FF8A8A; background: rgba(255, 80, 80, 0.1); display: block; border: 1px solid rgba(255, 80, 80, 0.2); }
    .success-msg { color: #6FEE9D; background: rgba(34, 197, 94, 0.1); display: block; border: 1px solid rgba(34, 197, 94, 0.2); }
    /* divider */
    .divider { display: flex; align-items: center; gap: 12px; margin: 1.8rem 0; }
    .divider-line { flex: 1; height: 1px; background: rgba(71, 85, 105, 0.3); }
    .divider-text { color: #64748B; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    /* links */
    .signup-redirect { text-align: center; margin-top: 1.8rem; font-size: 0.9rem; color: #94A3B8; }
    .signup-redirect a { color: #60A5FA; font-weight: 600; text-decoration: none; transition: color 0.2s; }
    .signup-redirect a:hover { color: #93C5FD; text-decoration: underline; }
    @media (max-width: 480px) { .professional-card { padding: 1.8rem 1.5rem; } h1 { font-size: 1.7rem; } }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="professional-card">
    <div class="brand-header">
      <div class="badge-icon">
        <i class="fas fa-shield-alt"></i>
      </div>
      <h1>DCAS · CPG</h1>
      <div class="subhead">Clinical Practice Guidelines — Provider Login</div>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <div class="input-label">
          <i class="fas fa-envelope"></i>
          <span>Email address</span>
        </div>
        <input type="email" id="username" name="username" class="input-field" placeholder="clinical@dcas.org" autocomplete="username" required>
      </div>

      <div class="form-group">
        <div class="input-label">
          <i class="fas fa-lock"></i>
          <span>Password</span>
        </div>
        <input type="password" id="password" name="password" class="input-field" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="login-btn">
        Sign In <i class="fas fa-arrow-right"></i>
      </button>

      <div id="authError" class="form-feedback" role="alert" aria-live="polite"></div>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">Or securely sign in with</div>
      <div class="divider-line"></div>
    </div>

    <div style="display: flex; justify-content: center; width: 100%;">
      <div id="g_id_onload"
           data-client_id="413832763437-48k3r32312e8uevrouha9ss11lk79un9.apps.googleusercontent.com"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="handleGoogleLogin"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin" 
           data-type="standard" 
           data-theme="filled_black" 
           data-size="large" 
           data-width="400"
           data-shape="pill">
      </div>
    </div>

    <div class="signup-redirect">
      New to the network? <a href="/signup.html">Register profile →</a>
    </div>
  </div>
</div>

<script>
  const AUTH_KEY = 'dcas_local_auth';
  const errorEl = document.getElementById('authError');

  // Helper to show styled messages
  function showMessage(text, isError = true) {
    errorEl.textContent = text;
    errorEl.className = 'form-feedback ' + (isError ? 'error-msg' : 'success-msg');
  }

  // Helper: Set local storage so the PWA app.js guard knows we are logged in
  function setLocalSession() {
    const payload = {
      loggedIn: true,
      issuedAt: Date.now(),
      expiresAt: Date.now() + (24 * 60 * 60 * 1000)
    };
    localStorage.setItem(AUTH_KEY, JSON.stringify(payload));
  }

  // 🚀 Google Login Logic
  async function handleGoogleLogin(response) {
    showMessage('Verifying secure token...', false);

    try {
      const res = await fetch('/api/google-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: response.credential })
      });
      
      const data = await res.json();
      
      if (res.ok) {
        showMessage('✅ Authentication successful. Redirecting...', false);
        setLocalSession(); 
        setTimeout(() => window.location.replace(data.redirect || 'index.html'), 1000);
      } else {
        showMessage('❌ ' + (data.error || 'Google authentication failed.'), true);
      }
    } catch(err) {
      showMessage('❌ Server connection failed. Is the Python server running?', true);
    }
  }

  // 🔄 Standard Form Login Logic
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const submitBtn = this.querySelector('.login-btn');
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.7';
    showMessage('Authenticating...', false);

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok) {
        showMessage('✅ Access granted. Loading protocols...', false);
        setLocalSession(); 
        setTimeout(() => window.location.replace(data.redirect || 'index.html'), 1000);
      } else {
        showMessage('❌ ' + (data.error || 'Invalid credentials.'), true);
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
      }
    } catch (err) {
      showMessage('❌ Server connection failed. Is the Python server running?', true);
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
    }
  });
</script>
</body>
</html>
