        /* ---------- WATER RIPPLE EFFECT – SMOOTH & ORGANIC ---------- */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }
        
        /* ---------- GLASS CARD – WITH RIPPLE SUPPORT ---------- */
        .menu-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            padding: 20px;
            position: relative;
            z-index: 1;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s ease forwards;
            word-wrap: break-word;
            overflow-wrap: break-word;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px 0 rgba(31, 38, 135, 0.4);
            border-color: rgba(255,255,255,0.9);
        }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

            transition: box-shadow 0.3s ease-in-out, border-color 0.3s ease, background 0.3s ease;
        }
        .menu-card.first-in-chapter[data-chapter] {
            background: rgba(255,255,255,0.85);
            border-width: 2px;
            animation: glowPulse 2s infinite ease-in-out;
            transform: scale(1);
        }
        .menu-card.first-in-chapter[data-chapter]:hover {
            transform: scale(1.02);
        }
        @keyframes glowPulse {
            0% { box-shadow: 0 0 8px 2px rgba(var(--glow-rgb), 0.6), 0 8px 32px 0 rgba(31, 38, 135, 0.25); }
            50% { box-shadow: 0 0 25px 8px rgba(var(--glow-rgb), 0.9), 0 8px 32px 0 rgba(31, 38, 135, 0.35); }
            100% { box-shadow: 0 0 8px 2px rgba(var(--glow-rgb), 0.6), 0 8px 32px 0 rgba(31, 38, 135, 0.25); }

        }

        // ---------- STORAGE FOR COMPLETION ----------
        const COMPLETION_KEY = 'dcas_cpg_completion';
        function loadCompletion() {
            try {
                const data = localStorage.getItem(COMPLETION_KEY);
                return data ? JSON.parse(data) : {};
            } catch(e) {
                return {};
            }
        }
        function saveCompletion(completion) {
            try {
                localStorage.setItem(COMPLETION_KEY, JSON.stringify(completion));
            } catch(e) {}
        }

        // ---------- STORAGE FOR STATS ----------
        const STATS_KEY = 'dcas_cpg_stats';
        function loadStats() {
            try {
                const data = localStorage.getItem(STATS_KEY);
                return data ? JSON.parse(data) : { totalAttempts: 0, chapters: {}, critical: { total: 0, correct: 0 } };
            } catch(e) {
                return { totalAttempts: 0, chapters: {}, critical: { total: 0, correct: 0 } };
            }
        }

        // ---------- UPDATE LIVE STATS BADGE ----------
        function updateStatsBadge() {
            const stats = loadStats();
            const totalAttempts = stats.totalAttempts || 0;
            const criticalTotal = stats.critical.total || 0;
            const criticalCorrect = stats.critical.correct || 0;
            const criticalAcc = criticalTotal ? Math.round((criticalCorrect / criticalTotal) * 100) : 0;
            document.getElementById('statsAttempts').innerText = totalAttempts;
            document.getElementById('statsCritical').innerText = `${criticalAcc}%`;
        }

        // ---------- UPDATE PROGRESS BAR ----------
        function updateProgressBar(completion) {
            const totalChapters = CHAPTERS.filter(ch => ch.id !== 'c0' && ch.id !== 'c-index').length;
            const completed = Object.values(completion).filter(v => v === true).length;
            const percent = totalChapters ? Math.round((completed / totalChapters) * 100) : 0;
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            if (progressBar) progressBar.style.width = percent + '%';
            if (progressText) progressText.innerText = `${completed}/${totalChapters} (${percent}%)`;
        }

        // ---------- TOGGLE COMPLETION CHECKBOX ----------
        function toggleCompletion(chapterId, checked) {
            const completion = loadCompletion();
            completion[chapterId] = checked;
            saveCompletion(completion);
            updateProgressBar(completion);
        }

        // ---------- HEADER SHORTCUTS VISIBILITY ----------
        function updateHeaderShortcuts(showHomeSpecific) {
            const headerShortcuts = document.getElementById('headerShortcuts');
            if (headerShortcuts) headerShortcuts.style.display = showHomeSpecific ? 'flex' : 'none';
        }

        // ---------- WATER RIPPLE EFFECT ----------
        function createRipple(event) {
            const target = event.currentTarget;
            const rect = target.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            ripple.style.width = ripple.style.height = '20px';
            ripple.style.background = 'rgba(255, 255, 255, 0.7)';
            
            target.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 600);
        }

        // ---------- RENDER MAIN MENU – FIXED BUTTON LOGIC (NO MISSING TABS) ----------
        function renderMenu() {
            const stats = loadStats();
            const completion = loadCompletion();

            let chaptersHtml = CHAPTERS.map((ch, index) => {
                const chapStats = stats.chapters[ch.id] || { attempts: 0, totalScore: 0, totalMax: 0 };
                const avg = chapStats.totalMax ? Math.round((chapStats.totalScore / chapStats.totalMax) * 100) : 0;
                
                // Summary link
                let summaryUrl;
                if (ch.chapterFile) {
                    summaryUrl = `chapters/${ch.chapterFile}?view=summary&section=${ch.sectionParam}`;
                } else {
                    summaryUrl = `chapters/${ch.id}.html?view=summary`;
                }

                // ---------- BUTTON VISIBILITY RULES (CRYSTAL CLEAR) ----------
                const isSpecial = (ch.id === 'c0' || ch.id === 'c-index');
                const isUniversalSub = ch.id.startsWith('c1s') && ch.id !== 'c1s1'; // c1s2 – c1s6
                
                // Special chapters: NO buttons at all (handled in template)
                // Universal Care subsections: NO Flashcards/Quiz (content not ready), YES Critical (will show Coming Soon)
                // All other chapters: YES to all buttons (Summary, Flashcards, Quiz, Critical)
                
                const showFlashcardsQuiz = !isSpecial && !isUniversalSub;
                const showCritical = ch.hasCritical && !isSpecial; // includes Universal Care subsections

                const firstClass = ch.isFirstInChapter ? 'first-in-chapter' : '';
                const chapterGroup = ch.chapterGroup ? `data-chapter="${ch.chapterGroup}"` : '';
                const isChecked = completion[ch.id] || false;
                const checkedAttr = isChecked ? 'checked' : '';

                return `
                    <div class="menu-card ${firstClass}" ${chapterGroup} style="animation-delay: ${index * 0.02}s;">
                        <div class="completion-wrapper">
                            <span class="status-badge">${ch.id.toUpperCase()}</span>
                            <label class="completion-checkbox">
                                <input type="checkbox" class="chapter-complete" data-chapter-id="${ch.id}" ${checkedAttr} onchange="window.app.toggleCompletion('${ch.id}', this.checked)">
                                <span>Done</span>
                            </label>
                        </div>
                        <h2>${ch.shortTitle}</h2>
                        <p>${ch.title} · ${chapStats.attempts} attempts · avg ${avg}%</p>
                        <div class="menu-sub-options">
                            <a href="${summaryUrl}" class="btn-action btn-summary">📘 Summary</a>
                            ${showFlashcardsQuiz ? `
                                <a href="chapters/${ch.id}.html?view=flashcards" class="btn-action btn-flash">📇 Flashcards</a>
                                <a href="chapters/${ch.id}.html?view=quiz" class="btn-action btn-quiz">📋 Quiz</a>
                            ` : ''}
                            ${showCritical ? `
                                <a href="chapters/${ch.id}.html?view=critical" class="btn-action btn-critical">🚨 Critical</a>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            const totalAttempts = stats.totalAttempts || 0;
            const criticalTotal = stats.critical.total || 0;
            const criticalCorrect = stats.critical.correct || 0;
            const criticalAcc = criticalTotal ? Math.round((criticalCorrect / criticalTotal) * 100) : 0;
            
            const totalChapters = CHAPTERS.filter(ch => ch.id !== 'c0' && ch.id !== 'c-index').length;
            const completed = Object.values(completion).filter(v => v === true).length;
            const percent = totalChapters ? Math.round((completed / totalChapters) * 100) : 0;
            
            const randomEncouragement = ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)];

            const statsHtml = `
                <div class="stats-card">
                    <h2 style="color:#0056b3;">📊 Overall Performance</h2>
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar" style="width: ${percent}%;"></div>
                    </div>
                    <div class="progress-stats">
                        <span>📌 Chapters completed</span>
                        <span id="progressText">${completed}/${totalChapters} (${percent}%)</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Total Quiz Attempts</span>
                        <span class="stat-value">${totalAttempts}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Critical Accuracy</span>
                        <span class="stat-value">${criticalAcc}% (${criticalCorrect}/${criticalTotal})</span>
                    </div>
                    <div class="encouragement">
                        💬 ${randomEncouragement}
                    </div>
                </div>
            `;

            document.getElementById('mainContent').innerHTML = `
                <div class="menu-grid">
                    ${chaptersHtml}
                    ${statsHtml}
                </div>
            `;

            // Add ripple listeners
            document.querySelectorAll('.menu-card, .btn-action, .home-btn, .header-btn').forEach(el => {
                el.addEventListener('click', createRipple);
                el.addEventListener('touchstart', createRipple);
            });

            updateHeaderShortcuts(true);
            updateStatsBadge();
        }

        // ---------- PAGE INIT ----------
        function initPage() {
            const isHomePage = !window.location.hash && !window.location.search;
            if (isHomePage) {
                renderMenu();
            } else {
                updateHeaderShortcuts(false);
                updateStatsBadge();
            }
        }

        // ---------- HOME BUTTON ----------
        const homeBtn = document.getElementById('homeBtn');
        if (homeBtn) {
            homeBtn.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'index.html';
            });
        }

        // ---------- INDEX BUTTON ----------
        const indexBtn = document.getElementById('headerIndexBtn');
        if (indexBtn) {
            indexBtn.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'chapters/c-index.html?view=summary';
            });
        }

        // ---------- EXPOSE TOGGLER ----------
        window.app = window.app || {};
        window.app.toggleCompletion = toggleCompletion;

        // ---------- START ----------
        initPage();
        window.CHAPTERS = CHAPTERS;
    })();
</script>
