<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Universal Care</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ---------- THEME CONFIGURATION ---------- */
        :root {
            /* --- LIGHT THEME (Fresh Clinical Blue) --- */
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #b8e1ff 50%, #f0f9ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            
            --text-primary: #1a2a3a;
            --text-secondary: #475569;
            --header-text: #0056b3;
            
            --toggle-bg: #cbd5e1;
            --toggle-active: #0056b3;
            
            --primary-accent: #0056b3;
            --success-color: #10b981;
            --error-color: #ef4444;
            
            --header-height: 72px;
        }

        [data-theme="dark"] {
            /* --- DARK THEME (Deep Teal/Slate) --- */
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.3);
            
            --text-primary: #1a2a3a; /* Keeping dark text on white cards */
            --text-secondary: #334155;
            --header-text: #ffffff;
            
            --toggle-bg: #374151;
            --toggle-active: #2dd4bf;
        }

        /* Shared Resets */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex; flex-direction: column;
            transition: background 0.5s ease;
        }

        /* ---------- HEADER ---------- */
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between;
            height: var(--header-height);
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .header-left, .header-right { display: flex; align-items: center; gap: 12px; }
        .header-text h1 { font-size: 1rem; font-weight: 800; color: var(--header-text); margin: 0; }
        .header-text p { font-size: 0.7rem; color: var(--header-text); opacity: 0.8; margin-top: 2px; }

        .icon-btn {
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--header-text); width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            cursor: pointer; transition: all 0.2s;
        }
        .icon-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.4); }

        .stats-badge {
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
            color: var(--header-text); display: flex; align-items: center; gap: 10px;
            backdrop-filter: blur(10px);
        }
        .stats-divider { width: 1px; height: 14px; background: currentColor; opacity: 0.4; }

        /* ---------- MAIN LAYOUT ---------- */
        main {
            flex: 1; padding: 24px 20px 80px 20px; /* Padding bottom fixes overlap */
            max-width: 800px; margin: 0 auto; width: 100%;
        }

        /* ---------- TAB NAVIGATION ---------- */
        .section-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .section-tab {
            background: rgba(255,255,255,0.3); color: var(--text-primary); border: 1px solid rgba(255,255,255,0.5);
            border-radius: 30px; padding: 10px 20px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .section-tab.active-tab {
            background: var(--primary-accent); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-color: transparent;
        }

        /* ---------- VIEW BUTTONS (Summary, Flashcards, etc) ---------- */
        .menu-sub-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 25px; }
        .btn-action {
            display: flex; align-items: center; justify-content: center; padding: 10px 5px;
            border-radius: 12px; font-size: 0.75rem; font-weight: 700; text-decoration: none;
            transition: all 0.2s; border: 1px solid transparent; cursor: pointer; text-align: center;
        }
        .btn-action:active { transform: translateY(1px); }
        
        /* Button Colors */
        .btn-summary { background: #fff7ed; color: #9a3412; border-color: #ffedd5; }
        .btn-flash { background: #eff6ff; color: #1e40af; border-color: #dbeafe; }
        .btn-quiz { background: #f0fdf4; color: #166534; border-color: #dcfce7; }
        .btn-scen { background: #fef2f2; color: #991b1b; border-color: #fee2e2; }

        /* ---------- CONTENT CARDS ---------- */
        .sum-card, .quiz-container, .critical-card, .stats-card, .coming-soon-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 24px; box-shadow: var(--glass-shadow);
            animation: fadeInUp 0.5s ease-out; margin-bottom: 20px;
        }
        
        h3, h4 { color: var(--primary-accent); margin-top: 0; }
        ul { padding-left: 20px; color: var(--text-primary); }
        li { margin-bottom: 8px; line-height: 1.5; }
        .highlight-box { background: rgba(0, 86, 179, 0.1); border-left: 4px solid var(--primary-accent); padding: 12px; border-radius: 8px; margin-top: 15px; }

        /* ---------- FLASHCARDS ---------- */
        .scene { width: 100%; height: 320px; perspective: 1000px; margin: 20px 0; cursor: pointer; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .card.is-flipped { transform: rotateY(180deg); }
        .card__face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 25px; text-align: center; border-radius: 20px; background: white;
        }
        .card__face--front { border: 2px solid #f0f0f0; color: var(--primary-accent); font-weight: 700; font-size: 1.2rem; }
        .card__face--back { background: linear-gradient(135deg, var(--primary-accent), #003d80); color: white; transform: rotateY(180deg); font-size: 1.1rem; line-height: 1.5; }

        /* ---------- QUIZ UI ---------- */
        .quiz-setup-container { text-align: center; }
        .setup-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd; background: white; font-weight: 600; cursor: pointer; }
        .option-btn { width: 100%; padding: 16px; margin-bottom: 10px; background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; text-align: left; font-size: 1rem; color: var(--text-primary); cursor: pointer; transition: background 0.2s; }
        .option-btn.correct { background: #d1fae5; border-color: #10b981; color: #065f46; }
        .option-btn.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .quiz-feedback { margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.9); border-radius: 12px; border-left: 5px solid #ccc; display: none; }

        /* ---------- FOOTER & CONTROL ---------- */
        .control-btn { width: 100%; padding: 14px; background: var(--primary-accent); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .control-btn:active { transform: scale(0.98); }
        footer { text-align: center; padding: 30px; color: var(--text-secondary); font-size: 0.75rem; opacity: 0.8; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="icon-btn" id="homeBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="header-text">
            <h1 id="pageTitle">Universal Care</h1>
            <p id="pageSubtitle">Section</p>
        </div>
    </div>
    <div class="header-right">
        <button class="icon-btn" id="themeToggle" title="Toggle Theme">🌗</button>
        <div class="stats-badge" id="liveStatsBadge">
            <span>📊 <span id="statsAttempts">0</span></span>
            <div class="stats-divider"></div>
            <span>🎯 <span id="statsCritical">0%</span></span>
        </div>
    </div>
</header>

<main id="mainContent">
    <div class="sum-card" style="text-align: center; padding: 40px;">
        <div style="font-size: 2rem; margin-bottom: 10px;">⏳</div>
        <p>Loading content...</p>
    </div>
</main>

<footer>
    <div>Created by Soliman Anas · Study Aid Only</div>
    <div style="margin-top:4px;">Based on DCAS Clinical Practice Guidelines 2025</div>
</footer>

<script src="../content/c1.js"></script>

<script src="../app.js"></script>

<script>
    (function() {
        const themeBtn = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        // Theme Init
        function initTheme() {
            const saved = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', saved);
        }

        // Theme Toggle
        function toggleTheme() {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        if (themeBtn) themeBtn.addEventListener('click', toggleTheme);
        initTheme();

        // Back Button Logic
        document.getElementById('homeBtn').addEventListener('click', () => {
            window.location.href = '../index.html';
        });

        // Update Stats in Header
        function loadStats() {
            try {
                const data = localStorage.getItem('dcas_cpg_stats');
                const stats = data ? JSON.parse(data) : { totalAttempts: 0, critical: { total: 0, correct: 0 } };
                const critAcc = stats.critical.total ? Math.round((stats.critical.correct / stats.critical.total) * 100) : 0;
                document.getElementById('statsAttempts').innerText = stats.totalAttempts || 0;
                document.getElementById('statsCritical').innerText = `${critAcc}%`;
            } catch(e) {}
        }
        loadStats();
    })();
</script>

</body>
</html>
