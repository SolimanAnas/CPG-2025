<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CPG Index</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ---------- THEME: BLUE-GREEN / TEAL (MATCHING MAIN APP) ---------- */
        :root {
            /* Light Theme */
            --bg-base: #f0fdfa;
            --bg-gradient: linear-gradient(135deg, #f0fdfa 0%, #ccfbf1 100%);
            
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(20, 184, 166, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(19, 78, 74, 0.05);
            
            --text-dark: #115e59;
            --text-medium: #0f766e;
            --text-light: #ffffff;
            
            --primary-accent: #0d9488;
            --item-hover: rgba(255, 255, 255, 0.9);
            
            /* Toggle Switch */
            --toggle-bg: #cbd5e1;
            --toggle-active: #0d9488;
            --toggle-knob: #ffffff;
            
            --header-bg: rgba(240, 253, 250, 0.9);
            --header-border: rgba(20, 184, 166, 0.1);
            
            --header-height: 72px;
        }

        /* --- DARK THEME --- */
        [data-theme="dark"] {
            --bg-base: #042f2e;
            --bg-gradient: linear-gradient(135deg, #042f2e 0%, #115e59 100%);
            
            --glass-bg: rgba(19, 78, 74, 0.6);
            --glass-border: rgba(94, 234, 212, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            
            --text-dark: #f0fdfa;
            --text-medium: #99f6e4;
            --text-light: #ccfbf1;
            
            --primary-accent: #2dd4bf;
            --item-hover: rgba(19, 78, 74, 0.8);
            
            --toggle-bg: #134e4a;
            --toggle-active: #2dd4bf;
            --toggle-knob: #f0fdfa;
            
            --header-bg: rgba(4, 47, 46, 0.9);
            --header-border: rgba(94, 234, 212, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* HEADER */
        header {
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--header-border);
            color: var(--text-dark);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--header-height);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            transition: background 0.3s ease, border 0.3s ease;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-right { display: flex; align-items: center; gap: 10px; }

        .header-text h1 { 
            font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; 
            color: var(--primary-accent); margin: 0;
        }

        /* Buttons */
        .icon-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-dark);
            width: 38px; height: 38px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none; /* For the link */
        }
        .icon-btn:active { transform: scale(0.95); background: rgba(13, 148, 136, 0.1); }

        /* SEARCH BAR */
        .search-container { padding: 20px 20px 10px; max-width: 800px; margin: 0 auto; width: 100%; position: relative; z-index: 1;}
        .search-input {
            width: 100%; padding: 14px 16px; border-radius: 16px;
            border: 1px solid var(--glass-border); background: var(--glass-bg);
            color: var(--text-dark); font-size: 1rem; outline: none;
            box-shadow: var(--glass-shadow);
            transition: all 0.2s;
        }
        .search-input::placeholder { color: var(--text-medium); opacity: 0.7; }
        .search-input:focus { border-color: var(--primary-accent); box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1); }

        /* LIST */
        main { flex: 1; padding: 10px 20px; max-width: 800px; margin: 0 auto; width: 100%; position: relative; z-index: 1;}
        
        .index-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        
        .index-item {
            display: block; text-decoration: none;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 16px;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .index-item:active { transform: scale(0.98); background: var(--item-hover); }
        
        .item-code {
            font-size: 0.7rem; font-weight: 700; color: var(--text-medium);
            text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 0.05em;
        }
        .item-title { font-size: 1rem; font-weight: 600; color: var(--text-dark); }

        /* GROUP HEADERS */
        .group-header {
            margin: 24px 0 12px; font-size: 0.8rem; font-weight: 800;
            color: var(--primary-accent); text-transform: uppercase; letter-spacing: 1px;
            padding-left: 5px; opacity: 0.9;
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="../index.html" class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <div class="header-text">
            <h1>CPG Index</h1>
        </div>
    </div>
    <div class="header-right">
        <button class="icon-btn" id="themeToggle" title="Toggle Theme">🌙</button>
    </div>
</header>

<div class="search-container">
    <input type="text" id="searchBox" class="search-input" placeholder="Search guidelines...">
</div>

<main>
    <div id="listContainer"></div>
</main>

<script>
    (function(){
        "use strict";

        // ---------- THEME TOGGLE LOGIC (Unified) ----------
        const themeBtn = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        function initTheme() {
            const saved = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', saved);
            updateThemeIcon(saved);
        }

        function toggleTheme() {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }

        function updateThemeIcon(theme) {
            themeBtn.innerText = theme === 'light' ? '🌙' : '☀️';
        }

        themeBtn.addEventListener('click', toggleTheme);
        initTheme();

        // ---------- CONTENT DATA ----------
        const CHAPTERS = [
            { id: "c0", shortTitle: "2025 Updates", title: "What's New in 2025", chapterFile: "c0", chapterGroup: "General" },
            
            // UNIVERSAL CARE
            { id: "c1s1", shortTitle: "1.1 Universal Care", title: "Core Assessment & Safety", chapterFile: "c1", sectionId: "c1s1", chapterGroup: "Universal Care" },
            { id: "c1s2", shortTitle: "1.2 Documentation", title: "PCR Standards", chapterFile: "c1", sectionId: "c1s2", chapterGroup: "Universal Care" },
            { id: "c1s3", shortTitle: "1.3 Triage", title: "Priority Categories", chapterFile: "c1", sectionId: "c1s3", chapterGroup: "Universal Care" },
            { id: "c1s4", shortTitle: "1.4 Functional Needs", title: "Special Access Needs", chapterFile: "c1", sectionId: "c1s4", chapterGroup: "Universal Care" },
            { id: "c1s5", shortTitle: "1.5 Treated at Scene", title: "Treat & Release", chapterFile: "c1", sectionId: "c1s5", chapterGroup: "Universal Care" },
            { id: "c1s6", shortTitle: "1.6 Refusal", title: "Refusal of Transfer", chapterFile: "c1", sectionId: "c1s6", chapterGroup: "Universal Care" },

            // AIRWAY
            { id: "c2", shortTitle: "2.1 Airway Mgmt", title: "Airway & Breathing", chapterFile: "c2", chapterGroup: "Airway" },
            { id: "c2-2", shortTitle: "2.2 FBAO", title: "Foreign Body Obstruction", chapterFile: "c2", sectionId: "c2s2", chapterGroup: "Airway" },
            { id: "c2-3", shortTitle: "2.3 Asthma", title: "Asthma Management", chapterFile: "c2", sectionId: "c2s3", chapterGroup: "Airway" },
            { id: "c2-4", shortTitle: "2.4 COPD", title: "COPD Management", chapterFile: "c2", sectionId: "c2s4", chapterGroup: "Airway" },
            { id: "c2-5", shortTitle: "2.5 Invasive Vent", title: "Mechanical Ventilation", chapterFile: "c2", sectionId: "c2s5", chapterGroup: "Airway" },

            // CARDIO
            { id: "c3-1", shortTitle: "3.1 Chest Pain", title: "ACS / Chest Pain", chapterFile: "c3", sectionId: "c3s1", chapterGroup: "Cardiovascular" },
            { id: "c3-2", shortTitle: "3.2 Bradycardia", title: "Adult Bradycardia", chapterFile: "c3", sectionId: "c3s2", chapterGroup: "Cardiovascular" },
            { id: "c3-3", shortTitle: "3.3 Tachycardia", title: "Adult Tachycardia", chapterFile: "c3", sectionId: "c3s3", chapterGroup: "Cardiovascular" },
            
            // RESUS
            { id: "c4-1", shortTitle: "4.1 Adult BLS", title: "Adult Basic Life Support", chapterFile: "c4", sectionId: "c4s1", chapterGroup: "Resuscitation" },
            { id: "c4-2", shortTitle: "4.2 Peds BLS", title: "Pediatric Basic Life Support", chapterFile: "c4", sectionId: "c4s2", chapterGroup: "Resuscitation" },
            { id: "c4-3", shortTitle: "4.3 Adult Arrest", title: "Adult Cardiac Arrest", chapterFile: "c4", sectionId: "c4s3", chapterGroup: "Resuscitation" },
            
            // TRAUMA
            { id: "c7-1", shortTitle: "7.1 General Trauma", title: "General Trauma Management", chapterFile: "c7", sectionId: "c7s1", chapterGroup: "Trauma" },
            
            // SCOPE
            { id: "s1", shortTitle: "Scope", title: "Scope of Practice", chapterFile: "s1", chapterGroup: "Reference" },
            { id: "m1", shortTitle: "Formulary", title: "Medications", chapterFile: "m1", chapterGroup: "Reference" }
        ];

        const container = document.getElementById('listContainer');
        const searchBox = document.getElementById('searchBox');

        function renderList(filterText = '') {
            container.innerHTML = '';
            
            // Group chapters
            let currentGroup = '';
            
            const filtered = CHAPTERS.filter(ch => {
                const text = (ch.id + ch.shortTitle + ch.title + ch.chapterGroup).toLowerCase();
                return text.includes(filterText.toLowerCase());
            });

            if(filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; opacity:0.6; padding:20px; color: var(--text-medium);">No results found</div>';
                return;
            }

            filtered.forEach(ch => {
                // Render Group Header
                if (ch.chapterGroup !== currentGroup) {
                    currentGroup = ch.chapterGroup;
                    const groupHeader = document.createElement('div');
                    groupHeader.className = 'group-header';
                    groupHeader.innerText = currentGroup;
                    container.appendChild(groupHeader);
                }

                // Create Link
                const sectionParam = ch.sectionId ? `&section=${ch.sectionId}` : '';
                const linkUrl = `${ch.chapterFile}.html?view=summary${sectionParam}`;

                const a = document.createElement('a');
                a.className = 'index-item';
                a.href = linkUrl;
                a.innerHTML = `
                    <span class="item-code">${ch.shortTitle}</span>
                    <div class="item-title">${ch.title}</div>
                `;
                container.appendChild(a);
            });
        }

        // Search Listener
        searchBox.addEventListener('input', (e) => renderList(e.target.value));

        // Init
        renderList();
    })();
</script>

</body>
</html>
