<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DCAS CPG 2025 · Coming Soon</title>
    <style>
        /* ---------- AERO VISTA GLASS THEME – refined for elegance ---------- */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.25);
            --primary-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --text-dark: #1a2a3a;
            --text-light: #ffffff;
            --accent-gold: #d4af37;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--primary-gradient);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            touch-action: manipulation;
        }
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .home-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            display: block;
            border: none;
            transition: all 0.2s ease;
        }
        .home-btn:active { background: rgba(255,255,255,0.4); transform: scale(0.95); }
        .header-text h1 { margin: 0; font-size: 1.2rem; font-weight: 700; letter-spacing: 0.5px; }
        .header-text p { margin: 2px 0 0; font-size: 0.85rem; opacity: 0.9; font-weight: 300; }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* ---------- FANCY COMING SOON CARD ---------- */
        .coming-soon-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: var(--glass-shadow);
            padding: 50px 30px;
            text-align: center;
            width: 100%;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .coming-soon-title {
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(145deg, #0a3b4e, #1e6f8f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.15);
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .coming-soon-subtitle {
            font-family: 'Georgia', 'Times New Roman', cursive, serif;
            font-size: 2rem;
            font-style: italic;
            color: #2c5364;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
            border-top: 2px solid rgba(0,86,179,0.2);
            border-bottom: 2px solid rgba(0,86,179,0.2);
            display: inline-block;
            padding: 10px 30px;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .back-button-container {
            margin-top: 40px;
        }

        .control-btn {
            padding: 14px 35px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            background: linear-gradient(to bottom, #00b4db, #0083b0);
            box-shadow: 0 4px 15px rgba(0, 131, 176, 0.4);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-block;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .control-btn:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        footer {
            padding: 30px;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .coming-soon-title { font-size: 3.2rem; }
            .coming-soon-subtitle { font-size: 1.6rem; }
        }
        @media (max-width: 400px) {
            .coming-soon-title { font-size: 2.6rem; }
            .coming-soon-subtitle { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <header>
        <button class="home-btn" id="homeBtn">←</button>
        <div class="header-text">
            <h1 id="pageTitle">DCAS CPG 2025</h1>
            <p id="pageSubtitle">Coming Soon</p>
        </div>
    </header>
    <main id="mainContent">
        <div class="coming-soon-card">
            <div class="coming-soon-title">Coming Soon</div>
            <div class="coming-soon-subtitle">Stay tuned.....</div>
            <div class="back-button-container">
                <button class="control-btn" data-action="backHome">← Back to Chapters</button>
            </div>
        </div>
    </main>
    <footer>
        <div>Created by Soliman Anas · Study aid only</div>
    </footer>
    <!-- app.js will replace content when chapter data exists -->
    <script src="../app.js"></script>
</body>
</html>
